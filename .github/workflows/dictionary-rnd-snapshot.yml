name: Apply indexed candidate retrieval checkpoint

on:
  push:
    branches:
      - r-and-d/dictionary-10k
    paths:
      - .github/workflows/dictionary-rnd-snapshot.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: r-and-d/dictionary-10k
          fetch-depth: 0
      - name: Apply locally verified patch
        shell: bash
        run: |
          git apply --check .rnd/indexed-retrieval.patch
          git apply .rnd/indexed-retrieval.patch
          rm .rnd/indexed-retrieval.patch
          rm .github/workflows/dictionary-rnd-snapshot.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat: index crossing candidates for large lexicons'
          git push origin HEAD:r-and-d/dictionary-10k
