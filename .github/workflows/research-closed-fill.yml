name: Research archive integrity

on:
  pull_request:
    branches:
      - main
    paths:
      - research/archive-manifest.json
      - research/closed-fill/**
      - research/phase-0-research-archive/**
      - tools/research-reference-audit.cjs
      - .github/workflows/research-closed-fill.yml
  workflow_dispatch:
    inputs:
      scope:
        description: Closed-fill reproduction scope
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - tail
          - full

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SNAPSHOT_REF: research/archive-closed-fill-2026-07-16
      SNAPSHOT_SHA: d1c12d8acca31edb3b38775db5166f4f5f59ce04
      REPRO_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.scope || 'smoke' }}
    steps:
      - name: Check out preservation tooling
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate preservation tooling
        run: |
          node --check tools/research-reference-audit.cjs
          bash -n research/closed-fill/reproduce.sh
          bash -n research/closed-fill/fresh-clone-smoke.sh

      - name: Verify all archives from a fresh shallow clone
        env:
          SCANWORD_TOOLING_REF: ${{ github.head_ref || github.ref_name }}
        run: bash research/closed-fill/fresh-clone-smoke.sh

      - name: Run requested extended closed-fill scope
        if: env.REPRO_SCOPE != 'smoke'
        run: bash research/closed-fill/reproduce.sh "${REPRO_SCOPE}"

      - name: Publish preservation output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-archive-${{ env.REPRO_SCOPE }}-${{ env.SNAPSHOT_SHA }}
          path: research-output/
          if-no-files-found: warn
