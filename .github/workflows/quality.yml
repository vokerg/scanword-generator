name: Arrowword quality gate

on:
  push:
    branches:
      - r-and-d/valid-arrowword-generator
      - r-and-d/coverage-090
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test deterministic closed-fill primitives
        run: node tools/closed-fill-test.cjs

      - name: Test deterministic clue-tail absorption
        run: node tools/construction-clue-tail-test.cjs

      - name: Test deterministic clue-footprint reflow
        run: node tools/construction-clue-reflow-test.cjs

      - name: Test deterministic two-footprint clue reflow
        run: node tools/construction-clue-pair-reflow-test.cjs

      - name: Test targeted residual victim replacement
        run: node tools/construction-victim-targeted-test.cjs

      - name: Test exact targeted tail postprocessing
        run: node tools/construction-victim-targeted-exact-test.cjs

      - name: Test bounded supplemental short fill
        run: node tools/targeted-short-fill-test.cjs

      - name: Test atomic targeted two-slot replacement
        run: node tools/construction-victim-targeted-pair-test.cjs

      - name: Smoke-test active closed-fill integration
        run: node tools/closed-fill-smoke.cjs | tee closed-fill-smoke.json

      - name: Probe every residual region
        run: node tools/closed-fill-probe.cjs 10 | tee closed-fill-probe.json

      - name: Run 100-seed active closed-fill diagnostic
        run: node tools/closed-fill-report.cjs 100 > closed-fill-report.jsonl

      - name: Compare legacy and polished panel-first portfolio
        env:
          SCANWORD_PORTFOLIO_ATTEMPTS: 240
          SCANWORD_REPACK_NODES: 600000
          SCANWORD_REPACK_BRANCH: 24
          SCANWORD_TARGETED_VICTIM_REGIONS: 3
          SCANWORD_TARGETED_VICTIM_WORDS: 4
          SCANWORD_TARGETED_VICTIM_DEPTH: 2
          SCANWORD_TARGETED_EXACT_VARIANTS: 4
          SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
        run: node tools/construction-v2-report.cjs 20 > construction-v2-report.jsonl

      - name: Render visual construction checkpoint
        env:
          SCANWORD_PORTFOLIO_ATTEMPTS: 240
          SCANWORD_REPACK_NODES: 600000
          SCANWORD_REPACK_BRANCH: 24
          SCANWORD_TARGETED_VICTIM_REGIONS: 3
          SCANWORD_TARGETED_VICTIM_WORDS: 4
          SCANWORD_TARGETED_VICTIM_DEPTH: 2
          SCANWORD_TARGETED_EXACT_VARIANTS: 4
          SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
        run: node tools/construction-visual-report.cjs construction-v2-report.jsonl construction-visuals

      - name: Mine scarce dictionary patterns
        run: RUN_COUNT=30 SEED_PREFIX=dictionary-demand node tools/pattern-demand.cjs > pattern-demand.txt

      - name: Publish construction diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construction-diagnostics
          path: |
            closed-fill-smoke.json
            closed-fill-probe.json
            closed-fill-report.jsonl
            construction-v2-report.jsonl
            construction-visuals/
            pattern-demand.txt
          if-no-files-found: warn

      - name: Audit dictionary
        run: node tools/dictionary-audit.cjs

      - name: Run 40-seed coverage benchmark
        run: node tools/benchmark.cjs

  portfolio-checkpoint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run enforced 100-seed portfolio checkpoint
        env:
          SCANWORD_CHECKPOINT_ENFORCE: 1
          SCANWORD_CHECKPOINT_CONCURRENCY: 2
          SCANWORD_PORTFOLIO_ATTEMPTS: 240
          SCANWORD_REPACK_NODES: 600000
          SCANWORD_REPACK_BRANCH: 24
          SCANWORD_TARGETED_VICTIM_REGIONS: 3
          SCANWORD_TARGETED_VICTIM_WORDS: 4
          SCANWORD_TARGETED_VICTIM_DEPTH: 2
          SCANWORD_TARGETED_EXACT_VARIANTS: 4
          SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
        run: node tools/construction-checkpoint.cjs 100 > construction-checkpoint.jsonl

      - name: Render enforced checkpoint scanword
        env:
          SCANWORD_PORTFOLIO_ATTEMPTS: 240
          SCANWORD_REPACK_NODES: 600000
          SCANWORD_REPACK_BRANCH: 24
          SCANWORD_TARGETED_VICTIM_REGIONS: 3
          SCANWORD_TARGETED_VICTIM_WORDS: 4
          SCANWORD_TARGETED_VICTIM_DEPTH: 2
          SCANWORD_TARGETED_EXACT_VARIANTS: 4
          SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
        run: node tools/construction-checkpoint-visual.cjs construction-checkpoint.jsonl construction-checkpoint-visual

      - name: Publish 100-seed checkpoint
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: construction-checkpoint-100
          path: |
            construction-checkpoint.jsonl
            construction-checkpoint-visual/
          if-no-files-found: warn
