name: Arrowword quality gate

on:
  push:
    branches:
      - r-and-d/valid-arrowword-generator
      - r-and-d/coverage-090
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit dictionary
        run: node tools/dictionary-audit.cjs

      - name: Run 40-seed coverage benchmark
        id: benchmark
        continue-on-error: true
        shell: bash
        run: |
          set +e
          node tools/benchmark.cjs > benchmark.log 2>&1
          code=$?
          cat benchmark.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload benchmark diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-090-benchmark-log
          path: benchmark.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce benchmark result
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.benchmark.outputs.exit_code }}" != "0" ]]; then
            exit 1
          fi
