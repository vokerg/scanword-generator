name: Arrowword quality gate

on:
  push:
    branches:
      - r-and-d/valid-arrowword-generator
      - r-and-d/coverage-090
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit dictionary
        run: node tools/dictionary-audit.cjs

      - name: Run 40-seed coverage benchmark
        run: node tools/benchmark.cjs
