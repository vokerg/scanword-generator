name: Arrowword quality gate

on:
  push:
    branches:
      - r-and-d/valid-arrowword-generator
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit dictionary
        id: audit
        continue-on-error: true
        shell: bash
        run: |
          set +e
          node tools/dictionary-audit.cjs > dictionary-audit.log 2>&1
          code=$?
          cat dictionary-audit.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run multi-seed structural benchmark
        id: benchmark
        continue-on-error: true
        shell: bash
        run: |
          set +e
          node tools/benchmark.cjs > benchmark.log 2>&1
          code=$?
          cat benchmark.log
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arrowword-quality-reports
          path: |
            dictionary-audit.log
            benchmark.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload R&D source snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arrowword-rnd-source
          path: |
            README.md
            index.html
            styles.css
            words.js
            short-words.js
            clues.js
            extra-dictionary.js
            dictionary-policy.js
            core.js
            solver.js
            renderer.js
            ui.js
            tools/*.cjs
          if-no-files-found: error
          retention-days: 1

      - name: Enforce quality gate
        if: always()
        shell: bash
        run: |
          audit="${{ steps.audit.outputs.exit_code }}"
          benchmark="${{ steps.benchmark.outputs.exit_code }}"
          if [[ "$audit" != "0" || "$benchmark" != "0" ]]; then
            echo "Quality gate failed: audit=$audit benchmark=$benchmark"
            exit 1
          fi
