name: Arrowword quality gate

on:
  push:
    branches:
      - r-and-d/valid-arrowword-generator
      - r-and-d/coverage-090
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test deterministic closed-fill primitives
        run: node tools/closed-fill-test.cjs

      - name: Smoke-test active closed-fill integration
        run: node tools/closed-fill-smoke.cjs | tee closed-fill-smoke.json

      - name: Run 100-seed active closed-fill diagnostic
        run: node tools/closed-fill-report.cjs 100 > closed-fill-report.jsonl

      - name: Publish closed-fill diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: closed-fill-diagnostics
          path: |
            closed-fill-smoke.json
            closed-fill-report.jsonl
          if-no-files-found: warn

      - name: Audit dictionary
        run: node tools/dictionary-audit.cjs

      - name: Run 40-seed coverage benchmark
        run: node tools/benchmark.cjs
