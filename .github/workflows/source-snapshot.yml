name: R&D source snapshot

on:
  push:
    branches:
      - r-and-d/coverage-090
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-090-source
          path: |
            README.md
            index.html
            styles.css
            words.js
            short-words.js
            clues.js
            extra-dictionary.js
            dictionary-policy.js
            two-letter-words.js
            core.js
            solver.js
            renderer.js
            ui.js
            tools/*.cjs
            .github/workflows/quality.yml
          if-no-files-found: error
          retention-days: 1
