name: Vocabulary category balance with repair

on:
  workflow_dispatch:
    inputs:
      seeds:
        description: Number of identical-seed category A/B pairs
        required: true
        default: "10"
  pull_request:
    branches:
      - research/closed-fill-snapshot-2026-07-16
    paths:
      - core.js
      - construction-editorial-repair-v3.js
      - editorial-demand-*.js
      - tools/vocabulary-category-checkpoint.cjs
      - .github/workflows/vocabulary-category-repair.yml

permissions:
  contents: read

jobs:
  category-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SCANWORD_CATEGORY_CONCURRENCY: 2
      SCANWORD_CATEGORY_REPAIR: on
      SCANWORD_ACTIVE_POOL_LIMIT: 3500
      SCANWORD_PORTFOLIO_PANEL_SLACK: 1
      SCANWORD_PORTFOLIO_ATTEMPTS: 240
      SCANWORD_PORTFOLIO_CLUE_RESTARTS: 160
      SCANWORD_VICTIM_BASES: 8
      SCANWORD_VICTIM_VARIANTS: 6
      SCANWORD_TARGETED_VICTIM_REGIONS: 3
      SCANWORD_TARGETED_VICTIM_WORDS: 4
      SCANWORD_TARGETED_VICTIM_DEPTH: 2
      SCANWORD_TARGETED_EXACT_VARIANTS: 4
      SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
      SCANWORD_REPACK_NODES: 600000
      SCANWORD_REPACK_BRANCH: 24
      SCANWORD_EDITORIAL_PAIR_DOMAIN: 80
      SCANWORD_EDITORIAL_PAIR_CANDIDATES: 600
      SCANWORD_EDITORIAL_BUNDLE_DOMAIN: 100
      SCANWORD_EDITORIAL_BUNDLE_NODES: 50000
      SCANWORD_EDITORIAL_BUNDLE_SOLUTIONS: 24
      SCANWORD_EDITORIAL_BUNDLE_VARIANTS: 24
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate category-repair syntax
        run: |
          node --check core.js
          node --check construction-editorial-repair-v3.js
          node --check tools/vocabulary-category-checkpoint.cjs

      - name: Run repaired category A/B
        env:
          SEED_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '10' }}
        run: |
          mkdir -p research-output
          node tools/vocabulary-category-checkpoint.cjs "${SEED_COUNT}" vocabulary-category-repair \
            | tee research-output/vocabulary-category-repair-${SEED_COUNT}.jsonl

      - name: Publish repaired category output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocabulary-category-repair-${{ github.sha }}
          path: research-output/
          if-no-files-found: error
