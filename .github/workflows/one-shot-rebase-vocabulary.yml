name: One-shot rebase vocabulary research

on:
  push:
    branches:
      - r-and-d/vocabulary-greatness-1.1-rebased
    paths:
      - .github/workflows/one-shot-rebase-vocabulary.yml

permissions:
  contents: write

jobs:
  transplant:
    runs-on: ubuntu-latest
    steps:
      - name: Check out rebased branch
        uses: actions/checkout@v4
        with:
          ref: r-and-d/vocabulary-greatness-1.1-rebased
          fetch-depth: 1

      - name: Fetch research source
        run: git fetch origin r-and-d/vocabulary-greatness-1.1

      - name: Copy research changes onto current main
        run: |
          set -euo pipefail
          files=(
            research/vocabulary-greatness-1.1/README.md
            tools/node-benchmark-bootstrap-v1.cjs
            tools/build-bulk-lexicon-v3.py
            tools/build-bulk-lexicon-v4.py
            tools/build-bulk-lexicon-v5.py
            tools/build-bulk-lexicon-v6.py
            tools/build-bulk-lexicon-v7.py
            tools/build-bulk-lexicon-v8.py
            tools/bulk-lexicon-audit.cjs
            tools/vocabulary-adaptive-checkpoint.cjs
            bulk-lexicon-runtime.js
            construction-vocabulary-portfolio-v1.js
            .github/workflows/vocabulary-greatness-1.1.yml
            .github/workflows/vocabulary-greatness-build.yml
            .github/workflows/vocabulary-adaptive.yml
            .github/workflows/vocabulary-release.yml
          )
          git checkout FETCH_HEAD -- "${files[@]}"
          git add "${files[@]}"
          git config user.name "scanword-research-bot"
          git config user.email "scanword-research-bot@users.noreply.github.com"
          git commit -m "research: rebase vocabulary greatness 1.1 onto current main"
          git push origin HEAD:r-and-d/vocabulary-greatness-1.1-rebased
