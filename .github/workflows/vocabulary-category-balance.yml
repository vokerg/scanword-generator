name: Vocabulary category balance

on:
  workflow_dispatch:
    inputs:
      seeds:
        description: Number of identical-seed category A/B pairs
        required: true
        default: "10"
  push:
    branches:
      - r-and-d/lexical-pareto-frontier
    paths:
      - core.js
      - dictionary-policy.js
      - bulk-lexicon/**
      - tools/benchmark-seed-v3.cjs
      - tools/vocabulary-category-checkpoint.cjs
      - .github/workflows/vocabulary-category-balance.yml

concurrency:
  group: vocabulary-category-balance-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  category-balance:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      SCANWORD_CATEGORY_CONCURRENCY: 2
      SCANWORD_ACTIVE_POOL_LIMIT: 3500
      SCANWORD_PORTFOLIO_PANEL_SLACK: 1
      SCANWORD_PORTFOLIO_ATTEMPTS: 240
      SCANWORD_PORTFOLIO_CLUE_RESTARTS: 160
      SCANWORD_VICTIM_BASES: 8
      SCANWORD_VICTIM_VARIANTS: 6
      SCANWORD_TARGETED_VICTIM_REGIONS: 3
      SCANWORD_TARGETED_VICTIM_WORDS: 4
      SCANWORD_TARGETED_VICTIM_DEPTH: 2
      SCANWORD_TARGETED_EXACT_VARIANTS: 4
      SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
      SCANWORD_REPACK_NODES: 600000
      SCANWORD_REPACK_BRANCH: 24
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate category benchmark syntax
        run: |
          node --check core.js
          node --check tools/benchmark-seed-v3.cjs
          node --check tools/vocabulary-category-checkpoint.cjs

      - name: Run category-balance A/B
        env:
          SEED_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '10' }}
        run: |
          mkdir -p research-output
          node tools/vocabulary-category-checkpoint.cjs "${SEED_COUNT}" \
            | tee research-output/vocabulary-category-balance-${SEED_COUNT}.jsonl

      - name: Publish category output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocabulary-category-balance-${{ github.sha }}
          path: research-output/
          if-no-files-found: error
