name: Lexical quality research

on:
  push:
    branches:
      - r-and-d/lexical-pareto-frontier
  pull_request:
    branches:
      - research/closed-fill-snapshot-2026-07-16
  workflow_dispatch:
    inputs:
      seeds:
        description: Number of identical-seed A/B pairs
        required: true
        default: "20"

permissions:
  contents: read

jobs:
  lexical-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SCANWORD_LEXICAL_CONCURRENCY: 2
      SCANWORD_PORTFOLIO_PANEL_SLACK: 1
      SCANWORD_PORTFOLIO_ATTEMPTS: 240
      SCANWORD_PORTFOLIO_CLUE_RESTARTS: 160
      SCANWORD_VICTIM_BASES: 8
      SCANWORD_VICTIM_VARIANTS: 6
      SCANWORD_TARGETED_VICTIM_REGIONS: 3
      SCANWORD_TARGETED_VICTIM_WORDS: 4
      SCANWORD_TARGETED_VICTIM_DEPTH: 2
      SCANWORD_TARGETED_EXACT_VARIANTS: 4
      SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
      SCANWORD_REPACK_NODES: 600000
      SCANWORD_REPACK_BRANCH: 24
      SCANWORD_WEAK_PLACEMENT_PENALTY: 12
      SCANWORD_TWO_LETTER_PLACEMENT_PENALTY: 8
      SCANWORD_THREE_LETTER_PLACEMENT_PENALTY: 4
      SCANWORD_LEXICAL_QUALITY_PENALTY: 0.25
      SCANWORD_GROWTH_LEXICAL_MULTIPLIER: 0
      SCANWORD_DENSE_LEXICAL_MULTIPLIER: 0.65
      SCANWORD_TWO_LETTER_DENSE_BUDGET: 5
      SCANWORD_TWO_LETTER_EXCESS_PENALTY: 18
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check syntax
        run: |
          node --check construction-portfolio-v3.js
          node --check construction-lexical-placement-v3.js
          node --check tools/benchmark-seed-v3.cjs
          node --check tools/lexical-frontier-checkpoint.cjs
          node --check tools/lexical-placement-checkpoint.cjs
          node --check tools/lexical-build-attempt-probe.cjs
          node --check tools/lexical-build-sweep.cjs

      - name: Test research primitives
        run: |
          node tools/construction-portfolio-v3-test.cjs
          node tools/construction-lexical-placement-v3-test.cjs

      - name: Sweep isolated build attempts
        run: |
          mkdir -p research-output
          node tools/lexical-build-sweep.cjs lexical-build-sweep 40 \
            | tee research-output/lexical-build-sweep.jsonl

      - name: Run full paired gates
        if: github.event_name == 'workflow_dispatch'
        env:
          SEED_COUNT: ${{ inputs.seeds }}
        run: |
          node tools/lexical-frontier-checkpoint.cjs "${SEED_COUNT}" \
            | tee research-output/lexical-frontier-${SEED_COUNT}.jsonl
          node tools/lexical-placement-checkpoint.cjs "${SEED_COUNT}" \
            | tee research-output/lexical-placement-${SEED_COUNT}.jsonl

      - name: Publish research output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lexical-quality-${{ github.sha }}
          path: research-output/
          if-no-files-found: error
