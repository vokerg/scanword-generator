name: Adaptive partial search

on:
  pull_request:
    branches:
      - main
    paths:
      - construction-vocabulary-portfolio-v1.js
      - tools/adaptive-partial-search-*.cjs
      - tools/bounded-partial-search-*.cjs
      - tools/node-benchmark-bootstrap-v1.cjs
      - research/adaptive-partial-search/**
      - .github/workflows/adaptive-partial-search.yml
  workflow_dispatch:

concurrency:
  group: adaptive-partial-search-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check adaptive-search syntax
        run: |
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          node --check construction-vocabulary-portfolio-v1.js
          node --check tools/adaptive-partial-search-test.cjs
          node --check tools/adaptive-partial-search-acceptance-v1.cjs
          node --check tools/node-benchmark-bootstrap-v1.cjs

      - name: Test deterministic adaptive planning
        env:
          NODE_OPTIONS: --require=./tools/node-benchmark-bootstrap-v1.cjs
        run: node tools/adaptive-partial-search-test.cjs

      - name: Preserve explicit pipeline parity
        run: node tools/construction-pipeline-parity-test.cjs

  development:
    needs: unit
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      SCANWORD_PARTIAL_SEARCH_CONCURRENCY: 2
      SCANWORD_PARTIAL_SEARCH_ENFORCE: 0
      SCANWORD_PARTIAL_SEARCH_MODES: off,shadow,beam
      SCANWORD_PARTIAL_SEARCH_POLICY: adaptive
      SCANWORD_PARTIAL_SEARCH_RATE: 0.20
      SCANWORD_PARTIAL_SEARCH_START: 14
      SCANWORD_PARTIAL_SEARCH_DEPTH: 4
      SCANWORD_PARTIAL_SEARCH_BEAM: 4
      SCANWORD_PARTIAL_SEARCH_BRANCHING: 3
      SCANWORD_PARTIAL_SEARCH_NODES: 48
      SCANWORD_PARTIAL_SEARCH_BEAM_ATTEMPTS: 48
      SCANWORD_PARTIAL_SEARCH_BEAM_OFFSET: 120
      SCANWORD_PARTIAL_SEARCH_SEED_TIMEOUT_MS: 1200000
      SCANWORD_ADAPTIVE_SEARCH_MAX_RUNTIME_RATIO: 1.45
    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.SOURCE_SHA }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Compare off, shadow and adaptive beam modes
        run: |
          set -o pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          mkdir -p research-output/adaptive-partial-search
          GITHUB_SHA="${SOURCE_SHA}" node tools/bounded-partial-search-checkpoint.cjs \
            research-output/adaptive-partial-search 20 \
            | tee research-output/adaptive-partial-search/console.jsonl

      - name: Enforce adaptive complete-objective acceptance
        run: node tools/adaptive-partial-search-acceptance-v1.cjs research-output/adaptive-partial-search

      - name: Publish development evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: adaptive-partial-search-development-${{ env.SOURCE_SHA }}
          path: research-output/adaptive-partial-search/
          if-no-files-found: error
