name: Apply v0.8 checkpoint

on:
  push:
    branches:
      - r-and-d/valid-arrowword-generator
    paths:
      - tools/apply-v08-part1.py
      - tools/apply-v08-part2.py
      - .github/workflows/apply-v08.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out R&D branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply v0.8 source changes
        run: |
          python3 tools/apply-v08-part1.py
          python3 tools/apply-v08-part2.py

      - name: Verify JavaScript and dictionary
        run: |
          node -c solver.js
          node -c renderer.js
          node -c ui.js
          node tools/dictionary-audit.cjs

      - name: Commit checkpoint
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: split clue text from arrow anchors"
          git push origin "HEAD:${GITHUB_REF_NAME}"
