name: Vocabulary baseline 1.1

on:
  push:
    branches:
      - main
    paths:
      - tools/node-benchmark-bootstrap-v1.cjs
      - tools/build-bulk-lexicon*.py
      - tools/bulk-lexicon-audit.cjs
      - tools/vocabulary-adaptive-checkpoint.cjs
      - construction-vocabulary-portfolio-v1.js
      - bulk-lexicon-runtime.js
      - bulk-lexicon/**
      - research/vocabulary-greatness-1.1/**
      - docs/milestones/v1.1-vocabulary-greatness.md
      - README.md
      - AGENTS.md
      - index.html
      - .github/workflows/vocabulary-greatness-1.1.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/node-benchmark-bootstrap-v1.cjs
      - tools/build-bulk-lexicon*.py
      - tools/bulk-lexicon-audit.cjs
      - tools/vocabulary-adaptive-checkpoint.cjs
      - construction-vocabulary-portfolio-v1.js
      - bulk-lexicon-runtime.js
      - bulk-lexicon/**
      - research/vocabulary-greatness-1.1/**
      - docs/milestones/v1.1-vocabulary-greatness.md
      - README.md
      - AGENTS.md
      - index.html
      - .github/workflows/vocabulary-greatness-1.1.yml
  workflow_dispatch:
    inputs:
      seeds:
        description: Identical-seed comparison pairs
        required: true
        default: "10"

concurrency:
  group: vocabulary-baseline-1.1-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  canonical-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      SCANWORD_PORTFOLIO_ATTEMPTS: 240
      SCANWORD_PORTFOLIO_CLUE_RESTARTS: 160
      SCANWORD_EDITORIAL_REPAIR: "on"
      SCANWORD_CONSTRUCTION_MODE: portfolio
      SCANWORD_VOCABULARY_PORTFOLIO: "on"
      SCANWORD_VOCABULARY_PORTFOLIO_LIMITS: 2500,3500
      SCANWORD_VOCABULARY_PORTFOLIO_MODE: full
    steps:
      - name: Check out candidate
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate runtime files
        run: |
          node --check tools/node-benchmark-bootstrap-v1.cjs
          node --check construction-vocabulary-portfolio-v1.js
          node --check bulk-lexicon-runtime.js
          node --check tools/bulk-lexicon-audit.cjs
          node --check tools/vocabulary-adaptive-checkpoint.cjs
          for file in bulk-lexicon/*.js; do node --check "$file"; done

      - name: Audit committed corpus
        run: |
          node tools/bulk-lexicon-audit.cjs | tee corpus-audit.json
          node - <<'NODE'
          const manifest = require('./bulk-lexicon/manifest.json');
          if (manifest.version !== 8) throw new Error(`Unexpected corpus version: ${manifest.version}`);
          if (manifest.actual.total.entries !== 40966) throw new Error(`Unexpected corpus size: ${manifest.actual.total.entries}`);
          if (manifest.editorialDebt.genericTemplatePercent !== 13.84) throw new Error('Editorial debt checkpoint changed');
          NODE

      - name: Prove browser-equivalent benchmark bootstrap
        env:
          NODE_OPTIONS: --require=${{ github.workspace }}/tools/node-benchmark-bootstrap-v1.cjs
          SCANWORD_BULK_LEXICON: "on"
        run: |
          node tools/benchmark-seed-v3.cjs vocabulary-baseline-bootstrap \
            | tee bootstrap.json
          node - <<'NODE'
          const fs = require("node:fs");
          const sample = JSON.parse(fs.readFileSync("bootstrap.json", "utf8").trim().split(/\r?\n/).at(-1));
          if (sample.sourceCorpusEntries < 40500) throw new Error(`Bulk corpus not loaded: ${sample.sourceCorpusEntries}`);
          const portfolio = sample.constructionV2?.vocabularyPortfolio;
          if (!portfolio || portfolio.candidates?.length !== 2) throw new Error("Vocabulary portfolio did not run");
          if (!sample.validation?.valid || sample.components !== 1 || !sample.exactCluesOnly) throw new Error("Canonical runtime failed validation");
          console.log(JSON.stringify({
            sourceCorpusEntries: sample.sourceCorpusEntries,
            poolEntries: sample.poolEntries,
            selectedLimit: portfolio.selectedLimit,
            panels: sample.panelCells,
            answers: sample.answers,
            crossings: sample.crossings,
            elapsedMs: sample.elapsedMs,
          }, null, 2));
          NODE

      - name: Run short truthful release comparison
        env:
          NODE_OPTIONS: --require=${{ github.workspace }}/tools/node-benchmark-bootstrap-v1.cjs
          SEEDS: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '3' }}
          SCANWORD_RELEASE_CONCURRENCY: 1
        run: |
          mkdir -p research-output
          node tools/vocabulary-release-checkpoint.cjs "${SEEDS}" vocabulary-baseline-truth \
            | tee "research-output/truth-${SEEDS}.jsonl"

      - name: Compare full and adaptive portfolio
        env:
          NODE_OPTIONS: --require=${{ github.workspace }}/tools/node-benchmark-bootstrap-v1.cjs
          SEEDS: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '3' }}
          SCANWORD_ADAPTIVE_CONCURRENCY: 1
        run: |
          node tools/vocabulary-adaptive-checkpoint.cjs "${SEEDS}" vocabulary-baseline-adaptive \
            | tee "research-output/adaptive-${SEEDS}.jsonl"

      - name: Publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocabulary-baseline-${{ github.sha }}
          path: |
            corpus-audit.json
            bootstrap.json
            research-output/
          if-no-files-found: warn
