name: Dictionary size and quality report

on:
  push:
    branches:
      - r-and-d/lexical-pareto-frontier
  pull_request:
    branches:
      - research/closed-fill-snapshot-2026-07-16
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build dictionary reports
        run: |
          mkdir -p research-output
          node --check tools/dictionary-count-v3.cjs
          node --check tools/bulk-lexicon-audit.cjs
          node tools/dictionary-count-v3.cjs > research-output/dictionary-count.json
          node tools/bulk-lexicon-audit.cjs > research-output/bulk-lexicon-audit.json
          cat research-output/dictionary-count.json
          cat research-output/bulk-lexicon-audit.json

      - name: Publish reports
        uses: actions/upload-artifact@v4
        with:
          name: dictionary-report-${{ github.sha }}
          path: research-output/
          if-no-files-found: error
