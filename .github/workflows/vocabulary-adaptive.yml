name: Adaptive vocabulary portfolio

on:
  pull_request:
    branches:
      - main
    paths:
      - construction-vocabulary-portfolio-v1.js
      - tools/node-benchmark-bootstrap-v1.cjs
      - tools/vocabulary-adaptive-checkpoint.cjs
      - .github/workflows/vocabulary-adaptive.yml
  workflow_dispatch:
    inputs:
      seeds:
        description: Identical-seed full/adaptive pairs
        required: true
        default: "20"

concurrency:
  group: vocabulary-adaptive-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      NODE_OPTIONS: --require=${{ github.workspace }}/tools/node-benchmark-bootstrap-v1.cjs
      SCANWORD_ADAPTIVE_CONCURRENCY: 2
      SCANWORD_PORTFOLIO_ATTEMPTS: 240
      SCANWORD_PORTFOLIO_CLUE_RESTARTS: 160
      SCANWORD_VICTIM_BASES: 8
      SCANWORD_VICTIM_VARIANTS: 6
      SCANWORD_TARGETED_VICTIM_REGIONS: 3
      SCANWORD_TARGETED_VICTIM_WORDS: 4
      SCANWORD_TARGETED_VICTIM_DEPTH: 2
      SCANWORD_TARGETED_EXACT_VARIANTS: 4
      SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
      SCANWORD_REPACK_NODES: 600000
      SCANWORD_REPACK_BRANCH: 24
      SCANWORD_EDITORIAL_PAIR_DOMAIN: 80
      SCANWORD_EDITORIAL_PAIR_CANDIDATES: 600
      SCANWORD_EDITORIAL_BUNDLE_DOMAIN: 100
      SCANWORD_EDITORIAL_BUNDLE_NODES: 50000
      SCANWORD_EDITORIAL_BUNDLE_SOLUTIONS: 24
      SCANWORD_EDITORIAL_BUNDLE_VARIANTS: 24
    steps:
      - name: Check out candidate
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate adaptive runtime
        run: |
          node --check tools/node-benchmark-bootstrap-v1.cjs
          node --check construction-vocabulary-portfolio-v1.js
          node --check tools/vocabulary-adaptive-checkpoint.cjs

      - name: Compare full and adaptive portfolios
        env:
          SEED_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '10' }}
        run: |
          mkdir -p research-output
          node tools/vocabulary-adaptive-checkpoint.cjs "${SEED_COUNT}" \
            | tee "research-output/vocabulary-adaptive-${SEED_COUNT}.jsonl"

      - name: Publish comparison
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vocabulary-adaptive-${{ github.sha }}
          path: research-output/
          if-no-files-found: error
