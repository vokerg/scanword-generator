name: Phase 1 selected-grid clue quality

on:
  pull_request:
    branches:
      - main
    paths:
      - construction-selected-grid-clue-metrics-v1.js
      - construction-clue-disambiguation-v1.js
      - tools/node-editorial-bootstrap-v1.cjs
      - tools/selected-grid-clue-metrics-test.cjs
      - tools/clue-disambiguation-test.cjs
      - tools/vocabulary-editorial-checkpoint.cjs
      - tools/render-selected-grid-clues.cjs
      - research/selected-grid-editorial-quality-1.2/**
      - .github/workflows/vocabulary-editorial-quality.yml
  workflow_dispatch:
    inputs:
      seeds:
        description: Identical-seed baseline/editorial pairs
        required: true
        default: "20"

concurrency:
  group: phase-1-selected-grid-clues-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compare:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SCANWORD_EDITORIAL_CONCURRENCY: 1
      SCANWORD_EDITORIAL_ENFORCE: 1
      SCANWORD_PORTFOLIO_ATTEMPTS: 240
      SCANWORD_PORTFOLIO_CLUE_RESTARTS: 160
      SCANWORD_VICTIM_BASES: 8
      SCANWORD_VICTIM_VARIANTS: 6
      SCANWORD_TARGETED_VICTIM_REGIONS: 3
      SCANWORD_TARGETED_VICTIM_WORDS: 4
      SCANWORD_TARGETED_VICTIM_DEPTH: 2
      SCANWORD_TARGETED_EXACT_VARIANTS: 4
      SCANWORD_TARGETED_EXACT_REPACK_NODES: 120000
      SCANWORD_REPACK_NODES: 600000
      SCANWORD_REPACK_BRANCH: 24
    steps:
      - name: Check out candidate
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate clue-quality runtime
        run: |
          node --check construction-selected-grid-clue-metrics-v1.js
          node --check construction-clue-disambiguation-v1.js
          node --check tools/node-editorial-bootstrap-v1.cjs
          node --check tools/selected-grid-clue-metrics-test.cjs
          node --check tools/clue-disambiguation-test.cjs
          node --check tools/vocabulary-editorial-checkpoint.cjs
          node --check tools/render-selected-grid-clues.cjs
          node tools/selected-grid-clue-metrics-test.cjs
          node tools/clue-disambiguation-test.cjs

      - name: Compare 20 identical seeds
        env:
          NODE_OPTIONS: --require=${{ github.workspace }}/tools/node-benchmark-bootstrap-v1.cjs --require=${{ github.workspace }}/tools/node-editorial-bootstrap-v1.cjs
          SEED_COUNT: ${{ github.event_name == 'workflow_dispatch' && inputs.seeds || '20' }}
        run: |
          mkdir -p research-output
          node tools/vocabulary-editorial-checkpoint.cjs "${SEED_COUNT}" \
            | tee "research-output/selected-grid-clues-${SEED_COUNT}.jsonl"

      - name: Render clue-only sample
        run: |
          node tools/render-selected-grid-clues.cjs \
            selected-grid-clues-sample \
            research-output/selected-grid-clues.svg

      - name: Publish Phase 1 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-1-selected-grid-clues-${{ github.sha }}
          path: research-output/
          if-no-files-found: error
