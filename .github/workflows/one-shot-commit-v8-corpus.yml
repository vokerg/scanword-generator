name: One-shot commit selected v8 corpus

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-commit-v8-corpus.yml
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  build-and-commit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: r-and-d/vocabulary-greatness-1.1-rebased

      - name: Download validated v8 corpus artifact
        uses: actions/download-artifact@v4
        with:
          name: vocabulary-greatness-corpus-452df58fdf844c30ba6b489602247795d04716ad
          path: generated/bulk-lexicon
          repository: vokerg/scanword-generator
          run-id: 29641316116
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify selected corpus checkpoint
        run: |
          for file in generated/bulk-lexicon/*.js; do node --check "$file"; done
          node - <<'NODE'
          const fs = require("node:fs");
          const manifest = JSON.parse(fs.readFileSync("generated/bulk-lexicon/manifest.json", "utf8"));
          if (manifest.version !== 8) throw new Error(`Unexpected corpus version: ${manifest.version}`);
          if (manifest.actual.total.entries !== 40966) throw new Error(`Unexpected corpus size: ${manifest.actual.total.entries}`);
          if (manifest.actual.entities.entries !== 1469) throw new Error(`Unexpected entity count: ${manifest.actual.entities.entries}`);
          if (manifest.editorialDebt.genericTemplatePercent !== 13.84) throw new Error("Unexpected editorial-debt checkpoint");
          if (manifest.canonicalExamples?.["2028462"] !== "УЛАНБАТОР") throw new Error("Canonical override regression");
          NODE

      - name: Commit generated corpus and retire this workflow
        run: |
          rm -rf bulk-lexicon
          mkdir -p bulk-lexicon
          cp generated/bulk-lexicon/*.js bulk-lexicon/
          cp generated/bulk-lexicon/manifest.json bulk-lexicon/
          git rm .github/workflows/one-shot-commit-v8-corpus.yml
          git config user.name "scanword-lexicon-bot"
          git config user.email "scanword-lexicon-bot@users.noreply.github.com"
          git add bulk-lexicon
          git commit -m "feat(dictionary): commit selected vocabulary 1.1 corpus v8"
          git push origin HEAD:r-and-d/vocabulary-greatness-1.1-rebased
