name: One-shot commit selected v8 corpus

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-commit-v8-corpus.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-commit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out research branch
        uses: actions/checkout@v4
        with:
          ref: r-and-d/vocabulary-greatness-1.1-rebased

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lexical tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install wordfreq pymorphy3 pymorphy3-dicts-ru Babel

      - name: Download attributed source data
        run: |
          mkdir -p source-data generated/bulk-lexicon
          curl --fail --location --retry 4 https://github.com/avidale/python-ruwordnet/releases/download/0.0.4/ruwordnet-2021.db --output source-data/ruwordnet-2021.db
          curl --fail --location --retry 4 https://download.geonames.org/export/dump/cities15000.zip --output source-data/cities15000.zip
          curl --fail --location --retry 4 https://download.geonames.org/export/dump/allCountries.zip --output source-data/allCountries.zip
          curl --fail --location --retry 4 https://download.geonames.org/export/dump/alternateNamesV2.zip --output source-data/alternateNamesV2.zip
          curl --fail --location --retry 4 https://download.geonames.org/export/dump/countryInfo.txt --output source-data/countryInfo.txt

      - name: Build selected corpus
        run: |
          python -m py_compile tools/build-bulk-lexicon*.py
          python tools/build-bulk-lexicon-v8.py \
            --ruwordnet-db source-data/ruwordnet-2021.db \
            --geonames-cities-zip source-data/cities15000.zip \
            --geonames-features-zip source-data/allCountries.zip \
            --geonames-alternates-zip source-data/alternateNamesV2.zip \
            --country-info source-data/countryInfo.txt \
            --out-dir generated/bulk-lexicon \
            --common 35000 --names 5000 --geography 10000 --entities 1500 --chunk-size 2500

      - name: Commit generated corpus and retire this workflow
        run: |
          rm -rf bulk-lexicon
          mkdir -p bulk-lexicon
          cp generated/bulk-lexicon/*.js bulk-lexicon/
          cp generated/bulk-lexicon/manifest.json bulk-lexicon/
          git rm .github/workflows/one-shot-commit-v8-corpus.yml
          git config user.name "scanword-lexicon-bot"
          git config user.email "scanword-lexicon-bot@users.noreply.github.com"
          git add bulk-lexicon
          git commit -m "feat(dictionary): commit selected vocabulary 1.1 corpus v8"
          git push origin HEAD:r-and-d/vocabulary-greatness-1.1-rebased
